<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan STS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Love+Ya+Like+A+Sister&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Love Ya Like A Sister", cursive;
      }

      .box {
        width: 200px;
        height: 200px;
        border: 1px solid black;
        margin-top: 20px;
      }

      .box button {
        border: none;
        background: transparent;
      }

      .box2 {
        width: 200px;
        height: 200px;
        border: 1px solid black;
        margin-top: 20px;
      }

      .box2 button {
        border: none;
        background: transparent;
      }
      .box3 {
        width: 200px;
        height: 200px;
        border: 1px solid black;
        margin-top: 20px;
      }

      .box3 button {
        border: none;
        background: transparent;
      }

      .blue {
        background-color: blue;
        transition: 0.9s;
      }

      .green {
        background-color: green;
        transition: 0.9s;
      }

      .yellow {
        background-color: yellow;
        transition: 0.9s;
      }

      .background {
        margin-top: 20px;
        background: transparent;
        border: none;
      }

      .body {
        background-color: black;
        color: white;
        transition: 0.95s;
      }
    </style>
  </head>
  <body>
    <div id="target" class="box">
      <button>🔵</button>
    </div>

    <div id="target2" class="box2">
      <button>🟢</button>
    </div>

    <div id="target3" class="box3">
      <button>🟡</button>
    </div>

    <h1>HABY</h1>

    <button id="background_body" class="background">🌙</button>
  </body>
  <script src="./script.js"></script>
</html>
