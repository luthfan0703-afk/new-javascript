<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> pertemuan ke-9</title> 
    
</head>
<style>
    .box {
        width: 200px;
        height: 100px;
        background-color: goldenrod;
        margin: 10px;
    }

    .success {
        background-color: green;
        transition: 0.9s;
    }

    .remove {
        display: none;
    }
</style>
<body>
    <h2>Bleajar classList javascript</h2>

    <div id="target"  class="box">kotak target</div>

    <button id="btn-add">1. tambah (.add)</button>
    <button id="btn-remove">1. hapus (.remove)</button>
    <button id="btn-toggle">1. saklar (.toggle)</button>

    <script src="./classList.js"></script>
</body>
</html>
